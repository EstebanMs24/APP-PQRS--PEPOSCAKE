<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pepo's Cake - PQRS | Iniciar Sesión</title>
  <link rel="icon" type="image/png" href="img/mascota-pepo.png?v=12" />
  <link rel="stylesheet" href="css/styles.css?v=12" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
</head>
<body class="login-page">
  <div class="login-wrapper">
    <!-- Panel izquierdo - Marca -->
    <div class="login-brand">
      <div class="login-brand-inner">
        <img src="img/mascota-pepo.png?v=12" alt="Mascota chef de Pepo's Cake" class="brand-mascot" />
        <h1 class="login-brand-name">Pepo's Cake</h1>
        <p class="login-brand-tagline">Sistema de Gestión PQRS</p>
      </div>
      <img src="img/peposcakecompleto.png" alt="Pepo's Cake Repostería" class="login-brand-wordmark" />
    </div>

    <!-- Panel derecho - Formulario -->
    <div class="login-form-panel">
      <div class="login-container">
        <div class="login-card">
          <div class="login-welcome">
            <span class="login-welcome-accent"></span>
            <h2>Bienvenido de nuevo</h2>
            <p>Ingresa tus datos para acceder al sistema</p>
          </div>

          <form id="loginForm" class="login-form">
            <div class="form-group">
              <label for="email">Correo electrónico</label>
              <div class="input-icon-wrapper">
                <span class="input-icon"><i class="bi bi-envelope-fill"></i></span>
                <input type="email" id="email" name="email" placeholder="usuario@peposcake.com" required autocomplete="email" />
              </div>
            </div>

            <div class="form-group">
              <label for="password">Contraseña</label>
              <div class="input-icon-wrapper">
                <span class="input-icon"><i class="bi bi-lock-fill"></i></span>
                <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password" />
                <button type="button" class="toggle-password" id="togglePassword" aria-label="Mostrar/ocultar contraseña"><i class="bi bi-eye-fill"></i></button>
              </div>
            </div>

            <div id="loginError" class="alert alert-error" style="display:none;"></div>

            <button type="submit" class="btn btn-login btn-block" id="loginBtn">
              <span class="btn-text">Ingresar <i class="bi bi-arrow-right"></i></span>
              <span class="btn-loader" style="display:none;"><i class="bi bi-hourglass-split"></i> Cargando...</span>
            </button>
          </form>

          <p class="login-footer">
            ¿Olvidaste tu contraseña? Contacta al administrador.<br>
            <a href="registro.html" class="login-footer-link">¿No tienes cuenta? Regístrate aquí</a>
          </p>
        </div>
        <p class="login-copyright">Pepo's Cake © 2025 · Uso interno exclusivo</p>
      </div>
    </div>
  </div>

  <script src="js/config.js?v=12"></script>
  <script src="js/utils.js?v=12"></script>
  <script src="js/supabase-client.js?v=12"></script>
  <script src="js/auth.js?v=12"></script>
</body>
</html>
