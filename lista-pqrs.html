            <div class="form-group">
              <label>Hasta</label>
              <input type="date" id="filtroHasta" />
            </div>
            <div class="form-group">
              <label>Etiqueta</label>
              <input type="text" id="filtroTag" placeholder="Buscar por etiqueta..." />
            </div>
            <div class="form-group filter-actions">
              <button class="btn btn-primary" id="btnFiltrar"><i class="bi bi-funnel-fill"></i> Filtrar</button>
              <button class="btn btn-outline" id="btnLimpiar"><i class="bi bi-x-circle"></i> Limpiar</button>
            </div>
          </div>
        </div>

          <span id="countLabel" class="count-label">Mostrando todos los casos</span>

        <div class="card-body p-0">
