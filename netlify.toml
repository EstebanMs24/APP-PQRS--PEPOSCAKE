# Netlify configuration for Pepo's Cake PQRS
# ============================================================

[build]
  publish = "."
  
# ---- REDIRECTS ----
# Redirigir rutas directas al index para SPA-like navigation
[[redirects]]
  from = "/dashboard"
  to = "/dashboard.html"
  status = 200

[[redirects]]
  from = "/nuevo-pqrs"
  to = "/nuevo-pqrs.html"
  status = 200

[[redirects]]
  from = "/lista-pqrs"
  to = "/lista-pqrs.html"
  status = 200

[[redirects]]
  from = "/detalle-pqrs"
  to = "/detalle-pqrs.html"
  status = 200

[[redirects]]
  from = "/reportes"
  to = "/reportes.html"
  status = 200

# ---- HEADERS DE SEGURIDAD ----
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdn.sheetjs.com https://cdnjs.cloudflare.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co; img-src 'self' data:;"

# Cache para assets estáticos
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
