<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reportes - PQRS Pepo's Cake</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <img src="img/peposcakecompleto.png" class="sidebar-logo-img" alt="Pepo's Cake PQRS" />
      </div>
      <button class="sidebar-close" id="sidebarClose"><i class="bi bi-x-lg"></i></button>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item">
        <span class="nav-icon"><i class="bi bi-speedometer2"></i></span> Dashboard
      </a>
      <a href="nuevo-pqrs.html" class="nav-item">
        <span class="nav-icon"><i class="bi bi-plus-circle-fill"></i></span> Nuevo PQRS
      </a>
      <a href="lista-pqrs.html" class="nav-item">
        <span class="nav-icon"><i class="bi bi-list-ul"></i></span> Todos los PQRS
      </a>
      <a href="reportes.html" class="nav-item active">
        <span class="nav-icon"><i class="bi bi-bar-chart-fill"></i></span> Reportes
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info" id="userInfo">
        <span class="user-avatar"><i class="bi bi-person-circle"></i></span>
        <div>
          <span class="user-name" id="userName">Cargando...</span>
          <span class="user-role" id="userRole"></span>
        </div>
      </div>
      <button class="btn-logout" id="logoutBtn"><i class="bi bi-box-arrow-left"></i> Salir</button>
    </div>
  </div>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- MAIN -->
  <div class="main-content">
    <header class="topbar">
      <button class="menu-toggle" id="menuToggle"><i class="bi bi-list"></i></button>
      <h2 class="page-title">Reportes y EstadÃ­sticas</h2>
      <div class="topbar-actions">
        <button class="btn btn-outline btn-sm" id="btnExportPDF" data-rol-minimo="admin"><i class="bi bi-file-pdf-fill"></i> PDF</button>
        <button class="btn btn-success btn-sm" id="btnExportExcel" data-rol-minimo="admin"><i class="bi bi-file-earmark-excel-fill"></i> Exportar Excel</button>
      </div>
    </header>

    <main class="page-body">
      <!-- FILTRO DE PERÃODO -->
      <div class="card filters-card mb-4">
        <div class="card-body">
          <div class="filters-grid filters-grid-3">
            <div class="form-group">
              <label>Desde</label>
              <input type="date" id="reporteDesde" />
            </div>
            <div class="form-group">
              <label>Hasta</label>
              <input type="date" id="reporteHasta" />
            </div>
            <div class="form-group filter-actions">
              <button class="btn btn-primary" id="btnGenerarReporte"><i class="bi bi-funnel-fill"></i> Generar</button>
              <button class="btn btn-outline" id="btnReporteTodo">Ver Todo</button>
            </div>
          </div>
        </div>
      </div>

      <!-- KPIs PRINCIPALES -->
      <section class="stats-grid stats-grid-5">
        <div class="stat-card stat-total">
          <div class="stat-icon"><i class="bi bi-inbox-fill"></i></div>
          <div class="stat-info">
            <span class="stat-number" id="rTotal">--</span>
            <span class="stat-label">Total PQRS</span>
          </div>
        </div>
        <div class="stat-card stat-pendiente">
          <div class="stat-icon"><i class="bi bi-hourglass-split"></i></div>
          <div class="stat-info">
            <span class="stat-number" id="rPendiente">--</span>
            <span class="stat-label">Pendientes</span>
          </div>
        </div>
        <div class="stat-card stat-proceso">
          <div class="stat-icon"><i class="bi bi-arrow-repeat"></i></div>
          <div class="stat-info">
            <span class="stat-number" id="rProceso">--</span>
            <span class="stat-label">En Proceso</span>
          </div>
        </div>
        <div class="stat-card stat-resuelto">
          <div class="stat-icon"><i class="bi bi-check-circle-fill"></i></div>
          <div class="stat-info">
            <span class="stat-number" id="rResuelto">--</span>
            <span class="stat-label">Resueltos</span>
          </div>
        </div>
        <div class="stat-card stat-tasa">
          <div class="stat-icon"><i class="bi bi-graph-up-arrow"></i></div>
          <div class="stat-info">
            <span class="stat-number" id="rTasa">--</span>
            <span class="stat-label">Tasa de ResoluciÃ³n</span>
          </div>
        </div>
      </section>

      <!-- GRÃFICAS -->
      <div class="charts-grid mt-4">
        <div class="card">
          <div class="card-header"><h3>Por Ãrea</h3></div>
          <div class="card-body">
            <div id="chartReporteArea" class="bar-chart-container"></div>
          </div>
        </div>
        <div class="card">
          <div class="card-header"><h3>Por Tipo</h3></div>
          <div class="card-body">
            <div id="chartReporteTipo" class="bar-chart-container"></div>
          </div>
        </div>
        <div class="card chart-full">
          <div class="card-header"><h3>PQRS por Mes</h3></div>
          <div class="card-body">
            <div id="chartReporteMes" class="bar-chart-container"></div>
          </div>
        </div>
      </div>

      <!-- TABLA DE RESUMEN POR MES -->
      <div class="card mt-4">
        <div class="card-header">
          <h3>Resumen Mensual</h3>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table">
              <thead>
                <tr>
                  <th>Mes</th>
                  <th>Total</th>
                  <th>Pendientes</th>
                  <th>En Proceso</th>
                  <th>Resueltos</th>
                  <th>% ResoluciÃ³n</th>
                </tr>
              </thead>
              <tbody id="tbodyMeses">
                <tr><td colspan="6" class="text-center">Cargando...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/config.js?v=4"></script>
  <script src="js/utils.js?v=4"></script>
  <script src="js/supabase-client.js?v=4"></script>
  <script src="js/auth.js?v=4"></script>
  <script src="js/exports.js?v=4"></script>
  <script src="js/reportes.js?v=4"></script>
</body>
</html>
