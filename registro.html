<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pepo's Cake - PQRS | Crear Cuenta</title>
  <link rel="icon" type="image/png" href="img/mascota-pepo.png?v=13" />
  <link rel="stylesheet" href="css/styles.css?v=13" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <img src="img/mascota-pepo.png?v=13" alt="Mascota chef de Pepo's Cake" class="brand-mascot brand-mascot--sm" />
        <h1 class="login-brand">Pepo's Cake</h1>
        <p class="login-subtitle">Crear nueva cuenta</p>
      </div>

      <form id="registroForm" class="login-form">
        <div class="form-group">
          <label for="nombre">Nombre completo</label>
          <div class="input-icon-wrapper">
            <span class="input-icon"><i class="bi bi-person-fill"></i></span>
            <input type="text" id="nombre" name="nombre" placeholder="Juan Pérez" required />
          </div>
        </div>

        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <div class="input-icon-wrapper">
            <span class="input-icon"><i class="bi bi-envelope-fill"></i></span>
            <input type="email" id="email" name="email" placeholder="usuario@peposcake.com" required autocomplete="email" />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="input-icon-wrapper">
            <span class="input-icon"><i class="bi bi-lock-fill"></i></span>
            <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="new-password" minlength="6" />
            <button type="button" class="toggle-password" id="togglePassword" aria-label="Mostrar/ocultar contraseña"><i class="bi bi-eye-fill"></i></button>
          </div>
          <small style="color: #666; font-size: 12px;">Mínimo 6 caracteres</small>
        </div>

        <div class="form-group">
          <label for="passwordConfirm">Confirmar contraseña</label>
          <div class="input-icon-wrapper">
            <span class="input-icon"><i class="bi bi-lock-fill"></i></span>
            <input type="password" id="passwordConfirm" name="passwordConfirm" placeholder="••••••••" required autocomplete="new-password" minlength="6" />
            <button type="button" class="toggle-password" id="togglePasswordConfirm" aria-label="Mostrar/ocultar contraseña"><i class="bi bi-eye-fill"></i></button>
          </div>
        </div>

        <div id="registroError" class="alert alert-error" style="display:none;"></div>
        <div id="registroSuccess" class="alert alert-success" style="display:none;"></div>

        <button type="submit" class="btn btn-primary btn-block" id="registroBtn">
          <span class="btn-text">Crear Cuenta</span>
          <span class="btn-loader" style="display:none;">⏳ Creando cuenta...</span>
        </button>
      </form>

      <p class="login-footer">
        ¿Ya tienes cuenta? <a href="index.html" style="color: #4FD1C5; text-decoration: none; font-weight: 600;">Inicia sesión aquí</a>
      </p>
    </div>
  </div>

  <script src="js/config.js?v=13"></script>
  <script src="js/utils.js?v=13"></script>
  <script src="js/supabase-client.js?v=13"></script>
  <script src="js/auth.js?v=13"></script>
</body>
</html>
