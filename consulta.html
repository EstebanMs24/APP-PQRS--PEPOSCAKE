<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consultar PQRS â€” Pepo's Cake</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/styles.css?v=6" />
</head>
<body>
  <div class="consulta-wrap">
    <div class="consulta-card">
      <div class="consulta-logo">
        <img src="img/peposcake.png" alt="Pepo's Cake" />
      </div>
      <p class="consulta-title">Consultar mi PQRS</p>
      <p class="consulta-subtitle">Ingresa el nÃºmero de caso que recibiste en tu correo para ver el estado actual.</p>

      <form class="consulta-form" id="formConsulta" autocomplete="off">
        <input
          type="text"
          id="inputCaso"
          placeholder="Ej: PC-2025-00123"
          maxlength="30"
          required
        />
        <button type="submit" class="btn btn-primary btn-sm">
          <i class="bi bi-search"></i> Buscar
        </button>
      </form>

      <div class="error-box" id="errorBox">
        <i class="bi bi-exclamation-triangle-fill"></i>
        <span id="errorMsg">No se encontrÃ³ ningÃºn PQRS con ese nÃºmero.</span>
      </div>

      <div class="result-box" id="resultBox">
        <div class="result-header">
          <i class="bi bi-file-text-fill"></i>
          <span id="resNumero">PC-2025-00000</span>
        </div>
        <div class="result-body">
          <div class="result-row">
            <span class="result-label">Estado</span>
            <span class="result-value"><span class="badge-estado" id="resEstado"></span></span>
          </div>
          <div class="result-row">
            <span class="result-label">Tipo</span>
            <span class="result-value" id="resTipo">â€”</span>
          </div>
          <div class="result-row">
            <span class="result-label">Ãrea</span>
            <span class="result-value" id="resArea">â€”</span>
          </div>
          <div class="result-row">
            <span class="result-label">Fecha de registro</span>
            <span class="result-value" id="resFecha">â€”</span>
          </div>
          <div class="result-row">
            <span class="result-label">DescripciÃ³n</span>
            <span class="result-value" id="resDescripcion" style="max-width:280px;word-break:break-word;">â€”</span>
          </div>
          <div class="result-row" id="rowSolucion" style="display:none">
            <span class="result-label">SoluciÃ³n/Respuesta</span>
            <span class="result-value" id="resSolucion" style="max-width:280px;word-break:break-word;">â€”</span>
          </div>
        </div>
      </div>

      <div class="back-link">
        <a href="index.html"><i class="bi bi-arrow-left"></i> Volver al inicio</a>
      </div>
    </div>
  </div>

  <script src="js/config.js?v=6"></script>
  <script src="js/utils.js?v=6"></script>
  <script src="js/supabase-client.js?v=6"></script>
  <script>
    const formConsulta = document.getElementById('formConsulta');
    const errorBox     = document.getElementById('errorBox');
    const errorMsg     = document.getElementById('errorMsg');
    const resultBox    = document.getElementById('resultBox');

    function hideAll() {
      errorBox.classList.remove('visible');
      resultBox.classList.remove('visible');
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      errorBox.classList.add('visible');
      resultBox.classList.remove('visible');
    }

    function estadoBadgeClass(estado) {
      if (!estado) return '';
      const map = {
        'Pendiente':  'badge-Pendiente',
        'En Proceso': 'badge-EnProceso',
        'Resuelto':   'badge-Resuelto',
        'Rechazado':  'badge-Rechazado',
      };
      return map[estado] || 'badge-Pendiente';
    }

    formConsulta.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAll();

      const numero = document.getElementById('inputCaso').value.trim().toUpperCase();
      if (!numero) return;

      const btn = formConsulta.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.innerHTML = '<i class="bi bi-hourglass-split"></i> Buscando...';

      try {
        await withSupabase(async (db) => {
          const { data, error } = await db
            .from('pqrs')
            .select('numero_caso, estado, tipo_solicitud, motivo, fecha_registro, fecha_resolucion, solucion')
            .eq('numero_caso', numero)
            .or('eliminado.is.null,eliminado.eq.false')
            .single();

          if (error || !data) {
            showError('No se encontrÃ³ ningÃºn PQRS con el nÃºmero "' + numero + '". Verifica e intenta de nuevo.');
            return;
          }

          // Render result - solo mostrar informaciÃ³n pÃºblica
          document.getElementById('resNumero').textContent = data.numero_caso;
          document.getElementById('resTipo').textContent = data.tipo_solicitud || 'â€”';
          document.getElementById('resDescripcion').textContent = data.motivo || 'â€”';

          const estadoEl = document.getElementById('resEstado');
          estadoEl.textContent = data.estado;
          estadoEl.className = 'badge-estado ' + estadoBadgeClass(data.estado);

          const rawFecha = data.fecha_registro;
          if (rawFecha) {
            const d = new Date(rawFecha);
            document.getElementById('resFecha').textContent = d.toLocaleDateString('es-CO', {
              day: '2-digit', month: 'long', year: 'numeric'
            });
          }

          const rowSolucion = document.getElementById('rowSolucion');
          if (data.solucion && data.estado === 'Resuelto') {
            document.getElementById('resSolucion').textContent = data.solucion;
            rowSolucion.style.display = 'flex';
          } else {
            rowSolucion.style.display = 'none';
          }

          resultBox.classList.add('visible');
        });
      } catch (err) {
        showError('Error al consultar. Por favor intenta mÃ¡s tarde.');
        console.error(err);
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-search"></i> Buscar';
      }
    });
  </script>
</body>
</html>
