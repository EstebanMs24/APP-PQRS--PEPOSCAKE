<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consultar PQRS — Pepo's Cake</title>
  <link rel="icon" type="image/png" href="img/mascota-pepo.png?v=13" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/styles.css?v=13" />
</head>
<body>
  <div class="consulta-wrap">
    <div class="consulta-card consulta-card--public">
      <!-- Hero de marca -->
      <div class="consulta-hero">
        <img src="img/mascota-pepo.png?v=13" alt="Mascota chef de Pepo's Cake" class="consulta-hero-mascot" />
        <div class="consulta-hero-name">Pepo's Cake</div>
        <div class="consulta-hero-sub">Consulta tu PQRS</div>
      </div>

      <div class="consulta-body">
        <p class="consulta-subtitle">Ingresa el número de caso y el correo con el que se registró tu solicitud.</p>

        <form class="consulta-form consulta-form--stacked" id="formConsulta" autocomplete="off">
          <div class="form-group">
            <label for="inputCaso">Número de caso</label>
            <input type="text" id="inputCaso" placeholder="Ej: PC-2025-00123" maxlength="30" required />
          </div>
          <div class="form-group">
            <label for="inputCorreo">Tu correo electrónico</label>
            <input type="email" id="inputCorreo" placeholder="cliente@ejemplo.com" maxlength="200" required />
          </div>
          <button type="submit" class="btn btn-primary btn-block">
            <i class="bi bi-search"></i> Consultar estado
          </button>
        </form>

        <div class="error-box" id="errorBox">
          <i class="bi bi-exclamation-triangle-fill"></i>
          <span id="errorMsg">No se encontró ningún PQRS con esos datos.</span>
        </div>

        <div class="result-box" id="resultBox">
          <div class="result-header">
            <i class="bi bi-receipt"></i>
            <span id="resNumero">PC-2025-00000</span>
          </div>
          <div class="result-body">
            <div class="result-row">
              <span class="result-label">Estado</span>
              <span class="result-value"><span class="badge-estado" id="resEstado"></span></span>
            </div>
            <div class="result-row">
              <span class="result-label">Tipo</span>
              <span class="result-value" id="resTipo">—</span>
            </div>
            <div class="result-row">
              <span class="result-label">Área</span>
              <span class="result-value" id="resArea">—</span>
            </div>
            <div class="result-row">
              <span class="result-label">Registrado</span>
              <span class="result-value" id="resFecha">—</span>
            </div>
            <div class="result-row" id="rowSolucion" style="display:none">
              <span class="result-label">Respuesta</span>
              <span class="result-value" id="resSolucion" style="max-width:280px;word-break:break-word;">—</span>
            </div>
          </div>
        </div>

        <div class="back-link">
          <a href="index.html"><i class="bi bi-arrow-left"></i> Volver al inicio</a>
        </div>
      </div>
    </div>
  </div>

  <script src="js/config.js?v=13"></script>
  <script src="js/utils.js?v=13"></script>
  <script src="js/supabase-client.js?v=13"></script>
  <script>
    const formConsulta = document.getElementById('formConsulta');
    const errorBox     = document.getElementById('errorBox');
    const errorMsg     = document.getElementById('errorMsg');
    const resultBox    = document.getElementById('resultBox');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorBox.classList.add('visible');
      resultBox.classList.remove('visible');
    }

    formConsulta.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.classList.remove('visible');
      resultBox.classList.remove('visible');

      const numero = document.getElementById('inputCaso').value.trim().toUpperCase();
      const correo = document.getElementById('inputCorreo').value.trim().toLowerCase();
      if (!numero || !correo) return;

      const btn = formConsulta.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.innerHTML = '<i class="bi bi-hourglass-split"></i> Buscando...';

      try {
        await withSupabase(async (db) => {
          const { data, error } = await db
            .from('pqrs')
            .select('numero_caso, estado, tipo_solicitud, area_responsable, motivo, fecha_registro, fecha_resolucion, solucion, correo_cliente')
            .eq('numero_caso', numero)
            .or('eliminado.is.null,eliminado.eq.false')
            .single();

          // Verificar coincidencia de correo (privacidad: no exponer casos por solo el número)
          const correoOk = data && (data.correo_cliente || '').trim().toLowerCase() === correo;
          if (error || !data || !correoOk) {
            showError('No encontramos un PQRS con ese número y correo. Verifica los datos e intenta de nuevo.');
            return;
          }

          document.getElementById('resNumero').textContent = data.numero_caso;
          document.getElementById('resTipo').textContent = getLabelTipo(data.tipo_solicitud);
          document.getElementById('resArea').textContent = getLabelArea(data.area_responsable);

          const estadoEl = document.getElementById('resEstado');
          estadoEl.textContent = getLabelEstado(data.estado);
          estadoEl.className = 'badge-estado badge-' + data.estado;

          if (data.fecha_registro) {
            document.getElementById('resFecha').textContent = new Date(data.fecha_registro)
              .toLocaleDateString('es-CO', { day: '2-digit', month: 'long', year: 'numeric' });
          }

          const rowSolucion = document.getElementById('rowSolucion');
          if (data.solucion && data.estado === 'Resuelto') {
            document.getElementById('resSolucion').textContent = data.solucion;
            rowSolucion.style.display = 'flex';
          } else {
            rowSolucion.style.display = 'none';
          }

          resultBox.classList.add('visible');
        });
      } catch (err) {
        showError('Error al consultar. Por favor intenta más tarde.');
        console.error(err);
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-search"></i> Consultar estado';
      }
    });
  </script>
</body>
</html>
